<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Review</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; color: #202124; }
      h1 { margin: 0 0 2px; }
      p { color: #5f6368; }
      table { width: 100%; border-collapse: collapse; margin-top: 16px; }
      th, td { border: 1px solid #dadce0; padding: 10px; text-align: left; vertical-align: top; }
      th { background: #f1f3f4; }
      .empty { color: #5f6368; font-style: italic; }
      .hidden { display: none; }
      .clickable-row { cursor: pointer; }
      .clickable-row:hover { background: #f8f9fa; }
      .drill-down { margin-top: 16px; }
      .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
      .toolbar button { padding: 8px 12px; cursor: pointer; }
      .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
      .page-header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
      .page-header-actions button { padding: 8px 12px; cursor: pointer; }
      .account-label { font-size: 0.85em; color: #5f6368; display: block; margin-top: 2px; }
      .footer {
        position: sticky;
        bottom: 0;
        background: #fff;
        border-top: 1px solid #dadce0;
        padding: 10px 0;
        margin-top: 12px;
      }
      .footer button:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { color: #188038; margin-top: 8px; }
      .muted { color: #5f6368; }
      .drill-down-meta { margin: 6px 0 4px; font-size: 0.88em; color: #5f6368; }
      .sender-spacer td { background: #f1f3f4; padding: 3px 6px; border-left: none; border-right: none; }
      .unsubscribe-btn { padding: 2px 8px; font-size: 0.82em; cursor: pointer; }
      .unsubscribe-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .deletion-progress:not(.hidden) { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
      .deletion-progress progress { flex: 1; height: 10px; }
    </style>
  </head>
  <body>
    <div class="page-header">
      <div>
        <h1>Email Review</h1>
        <span id="current-account-label" class="account-label hidden"></span>
      </div>
      <div class="page-header-actions">
        <button id="change-account-button" type="button" class="hidden">Change mailbox</button>
        <button id="mode-toggle-button" type="button" class="hidden">Full scan</button>
        <button id="history-button" type="button">History</button>
      </div>
    </div>

    <section id="account-picker-view" class="hidden">
      <p>Select a mailbox to scan:</p>
      <table>
        <tbody id="account-list"></tbody>
      </table>
    </section>

    <section id="series-view" class="hidden">
      <div class="toolbar">
        <button id="previous-window-button" type="button">← Previous window</button>
        <strong id="window-range-label">Reviewing: —</strong>
        <button id="next-window-button" type="button">Next window →</button>
      </div>
      <div id="series-status" class="status hidden"></div>
      <div id="deleted-total-label" class="muted">0 emails deleted this session</div>
      <div id="deletion-progress" class="deletion-progress hidden">
        <span id="deletion-progress-text">Deleting…</span>
        <progress id="deletion-progress-bar" value="0" max="100"></progress>
      </div>
      <table>
        <thead>
          <tr>
            <th>Domain</th>
            <th>Email Count</th>
            <th>Total Size</th>
            <th>Oldest Date</th>
          </tr>
        </thead>
        <tbody id="results-body">
          <tr>
            <td colspan="4" class="empty">Loading series…</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section id="drill-down-view" class="drill-down hidden">
      <div class="toolbar">
        <button id="back-button" type="button">← Back</button>
        <strong id="drill-down-title">Sender</strong>
      </div>
      <div id="drill-down-meta" class="drill-down-meta"></div>
      <table>
        <thead>
          <tr>
            <th><input id="select-all-checkbox" type="checkbox" /></th>
            <th>Sender</th>
            <th>Subject</th>
            <th>Date</th>
            <th>Size (KB)</th>
          </tr>
        </thead>
        <tbody id="drill-down-body"></tbody>
      </table>
      <div id="drill-down-status" class="status hidden"></div>
      <div class="footer">
        <button id="delete-button" type="button" disabled>Delete 0 emails (0 KB)</button>
      </div>
    </section>

    <script src="../src/query.js"></script>
    <script src="../src/clusterer.js"></script>
    <script src="../src/logger.js"></script>
    <script src="review.js"></script>
  </body>
</html>
